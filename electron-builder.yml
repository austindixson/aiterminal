appId: com.aiterminal.app
productName: AITerminal
copyright: Copyright © 2026 AITerminal

directories:
  output: out
  buildResources: build

files:
  - dist/**/*
  - package.json

extraResources:
  - from: scripts/kokoro-tts-stdio.py
    to: scripts/kokoro-tts-stdio.py

mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  darkModeSupport: true

win:
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  artifactName: "${productName}-${version}-setup.${ext}"

linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  category: Development

dmg:
  artifactName: "${productName}-${version}-${arch}.${ext}"

electronVersion: null

asar: true
