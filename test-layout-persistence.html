<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Layout Persistence Test</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      max-width: 800px;
      margin: 50px auto;
      padding: 20px;
      line-height: 1.6;
    }
    .section {
      background: #f5f5f5;
      padding: 15px;
      border-radius: 8px;
      margin: 20px 0;
    }
    button {
      background: #007acc;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 4px;
      cursor: pointer;
      margin: 5px;
    }
    button:hover {
      background: #005a9e;
    }
    pre {
      background: #1e1e1e;
      color: #d4d4d4;
      padding: 15px;
      border-radius: 4px;
      overflow-x: auto;
    }
    .success { color: #4ec9b0; }
    .error { color: #f48771; }
    .info { color: #9cdcfe; }
  </style>
</head>
<body>
  <h1>Layout Persistence Test</h1>

  <div class="section">
    <h2>Test Storage Key</h2>
    <p>Storage Key: <code>aiterminal-editor-layout</code></p>
  </div>

  <div class="section">
    <h2>Controls</h2>
    <button onclick="saveTestLayout()">Save Test Layout</button>
    <button onclick="loadLayout()">Load Layout</button>
    <button onclick="clearLayout()">Clear Layout</button>
    <button onclick="saveLegacyLayout()">Save Legacy Layout (v0)</button>
  </div>

  <div class="section">
    <h2>Output</h2>
    <pre id="output"></pre>
  </div>

  <script>
    const STORAGE_KEY = 'aiterminal-editor-layout';
    const output = document.getElementById('output');

    function log(message, type = 'info') {
      const timestamp = new Date().toISOString();
      const className = type;
      output.innerHTML += `<div class="${className}">[${timestamp}] ${message}</div>\n`;
      output.scrollTop = output.scrollHeight;
    }

    function saveTestLayout() {
      try {
        const layout = {
          version: 1,
          timestamp: Date.now(),
          columns: [
            {
              id: 'col-1',
              tabs: [
                {
                  id: 'tab-1',
                  filePath: '/src/test.ts',
                  title: 'test.ts',
                  isActive: true,
                  isModified: false,
                  language: 'typescript'
                }
              ],
              activeTabId: 'tab-1',
              splitRatio: 0.6
            },
            {
              id: 'col-2',
              tabs: [
                {
                  id: 'tab-2',
                  filePath: '/src/test2.ts',
                  title: 'test2.ts',
                  isActive: true,
                  isModified: true,
                  language: 'typescript'
                }
              ],
              activeTabId: 'tab-2',
              splitRatio: 0.4
            }
          ],
          activeColumnId: 'col-1'
        };

        localStorage.setItem(STORAGE_KEY, JSON.stringify(layout));
        log('Test layout saved successfully', 'success');
        log(`Saved layout: ${JSON.stringify(layout, null, 2)}`, 'info');
      } catch (error) {
        log(`Failed to save layout: ${error.message}`, 'error');
      }
    }

    function loadLayout() {
      try {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (!stored) {
          log('No saved layout found', 'error');
          return;
        }

        const parsed = JSON.parse(stored);
        log('Layout loaded successfully', 'success');
        log(`Version: ${parsed.version || 'legacy (no version field)'}`, 'info');
        log(`Timestamp: ${parsed.timestamp ? new Date(parsed.timestamp).toISOString() : 'N/A'}`, 'info');
        log(`Columns: ${parsed.columns?.length || 0}`, 'info');
        log(`Active Column: ${parsed.activeColumnId || 'none'}`, 'info');
        log(`Full layout:\n${JSON.stringify(parsed, null, 2)}`, 'info');
      } catch (error) {
        log(`Failed to load layout: ${error.message}`, 'error');
      }
    }

    function clearLayout() {
      try {
        localStorage.removeItem(STORAGE_KEY);
        log('Layout cleared successfully', 'success');
      } catch (error) {
        log(`Failed to clear layout: ${error.message}`, 'error');
      }
    }

    function saveLegacyLayout() {
      try {
        // Save a legacy layout (no version field) to test migration
        const legacyLayout = {
          columns: [
            {
              id: 'col-legacy',
              tabs: [
                {
                  id: 'tab-legacy',
                  filePath: '/src/legacy.ts',
                  title: 'legacy.ts',
                  isActive: true,
                  isModified: false,
                  language: 'typescript'
                }
              ],
              activeTabId: 'tab-legacy',
              splitRatio: null
            }
          ],
          activeColumnId: 'col-legacy'
        };

        localStorage.setItem(STORAGE_KEY, JSON.stringify(legacyLayout));
        log('Legacy layout saved (no version field)', 'success');
        log(`This will trigger migration on next load`, 'info');
      } catch (error) {
        log(`Failed to save legacy layout: ${error.message}`, 'error');
      }
    }

    // Initialize
    log('Layout persistence test page loaded', 'success');
    log('Click buttons to test persistence features', 'info');
  </script>
</body>
</html>
